services:
  - type: web
    name: luma-backend
    env: node
    region: frankfurt
    plan: free
    rootDir: apps/backend
    buildCommand: npm install && npx prisma generate --schema=src/prisma/schema.prisma
    startCommand: npx prisma migrate deploy --schema=src/prisma/schema.prisma && node src/index.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: luma-db
          property: connectionString

databases:
  - name: luma-db
    databaseName: luma
    plan: free
    region: frankfurt
